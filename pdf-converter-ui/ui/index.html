<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPEG2PDF-OFD OCR</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background-color: #f5f6fa;
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: none;
            font-size: 15px;
            cursor: pointer;
            color: #666;
            position: relative;
            transition: color 0.2s;
        }

        .tab-btn:hover {
            color: #3498db;
        }

        .tab-btn.active {
            color: #3498db;
            font-weight: 500;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #3498db;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
        }

        .path-row {
            display: flex;
            gap: 10px;
        }

        .path-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: #f9f9f9;
        }

        .path-input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dfe6e9;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #3498db;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
        }

        .progress-section {
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar-container {
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: #3498db;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .log-area {
            height: 150px;
            overflow-y: auto;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 12px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line {
            margin-bottom: 2px;
        }

        .log-line.error {
            color: #e74c3c;
        }

        .log-line.success {
            color: #27ae60;
        }

        .success-message {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .success-message.active {
            display: block;
        }

        .success-message h4 {
            margin-bottom: 8px;
        }

        .file-list {
            list-style: none;
            font-size: 13px;
        }

        .file-list li {
            padding: 4px 0;
            border-bottom: 1px dashed #ccc;
        }

        .file-list li:last-child {
            border-bottom: none;
        }

        .hidden {
            display: none !important;
        }

        /* Range Slider */
        .range-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .range-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
        }

        .range-value {
            min-width: 60px;
            text-align: right;
            font-size: 13px;
            color: #666;
            font-family: "Consolas", monospace;
        }

        /* Settings buttons */
        .settings-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .settings-buttons .btn {
            min-width: 120px;
        }

        /* Loading overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #loadingOverlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e0e0e0;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 14px;
            font-size: 14px;
            color: #7f8c8d;
        }
        .loading-error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Loading overlay: shown until pywebview API is ready -->
    <div id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing...</div>
        <div class="loading-error" id="loadingError">Bridge initialization failed. Please restart the application.</div>
    </div>

    <div class="container">
        <h1>JPEG2PDF-OFD OCR</h1>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('convert', this)" data-i18n="tab_convert">轉換</button>
            <button class="tab-btn" onclick="switchTab('settings', this)" data-i18n="tab_settings">設定</button>
        </div>

        <!-- Tab 1: Convert -->
        <div id="tab-convert" class="tab-content active">
            <!-- Input Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_input">輸入設置</div>

                <div class="form-group">
                    <label data-i18n="label_input_type">輸入類型</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="inputType" value="folder" checked onchange="updateInputType()">
                            <span data-i18n="label_image_folder">圖片資料夾</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="inputType" value="pdf" onchange="updateInputType()">
                            <span data-i18n="label_pdf_file">PDF 檔案</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label id="inputLabel" data-i18n="label_select_image_folder">選擇圖片資料夾</label>
                    <div class="path-row">
                        <input type="text" id="inputPath" class="path-input" data-i18n-placeholder="placeholder_browse" placeholder="點擊瀏覽選擇..." readonly>
                        <button class="btn btn-secondary" onclick="browseInput()" data-i18n="btn_browse">瀏覽</button>
                    </div>
                </div>
            </div>

            <!-- OCR Settings -->
            <div class="card">
                <div class="card-title" data-i18n="card_ocr">OCR 設置</div>

                <div class="form-group">
                    <label data-i18n="label_ocr_language">識別語言</label>
                    <select id="language">
                        <option value="chinese_cht">繁體中文</option>
                        <option value="ch">简体中文</option>
                        <option value="en">English</option>
                        <option value="japan">日本語</option>
                        <option value="korean">한국어</option>
                        <option value="french">Français</option>
                        <option value="german">Deutsch</option>
                        <option value="spanish">Español</option>
                        <option value="arabic">العربية</option>
                        <option value="hebrew">עברית</option>
                    </select>
                </div>
            </div>

            <!-- Output Settings -->
            <div class="card">
                <div class="card-title" data-i18n="card_output">輸出設置</div>

                <div class="form-group">
                    <label data-i18n="label_output_format">輸出格式</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="formatPdf" checked>
                            PDF
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="formatOfd" checked>
                            OFD
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="formatTxt">
                            TXT
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="multiPage">
                        <span data-i18n="label_multi_page_mode">多頁模式 (所有圖片合併為一個檔案)</span>
                    </label>
                </div>

                <div class="form-group">
                    <label data-i18n="label_output_folder">輸出資料夾</label>
                    <div class="path-row">
                        <input type="text" id="outputPath" class="path-input" data-i18n-placeholder="placeholder_browse" placeholder="點擊瀏覽選擇..." readonly>
                        <button class="btn btn-secondary" onclick="browseOutput()" data-i18n="btn_browse">瀏覽</button>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="card">
                <button id="startBtn" class="btn btn-success start-btn" onclick="startConversion()" data-i18n="btn_start">
                    開始轉換
                </button>
                <button id="cancelBtn" class="btn btn-danger start-btn hidden" onclick="cancelConversion()" data-i18n="btn_cancel">
                    取消轉換
                </button>
            </div>

            <!-- Progress Section -->
            <div id="progressSection" class="card progress-section">
                <div class="card-title" data-i18n="card_progress">轉換進度</div>

                <div class="progress-text" id="progressText" data-i18n="text_preparing">準備中...</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="log-area" id="logArea"></div>

                <div id="successMessage" class="success-message">
                    <h4 data-i18n="text_complete">轉換完成!</h4>
                    <ul class="file-list" id="fileList"></ul>
                </div>
            </div>
        </div>

        <!-- Tab 2: Settings -->
        <div id="tab-settings" class="tab-content">
            <!-- OCR Engine Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_ocr_engine">OCR 引擎</div>

                <div class="form-group">
                    <label data-i18n="label_engine">引擎</label>
                    <select id="settingOcrEngine">
                        <option value="auto" data-i18n="option_auto">自動</option>
                        <option value="rapidocr">RapidOCR</option>
                        <option value="tesseract">Tesseract</option>
                    </select>
                </div>

                <div class="form-group">
                    <label data-i18n="label_tesseract_data_path">Tesseract 資料路徑</label>
                    <div class="path-row">
                        <input type="text" id="settingTesseractDataPath" class="path-input" data-i18n-placeholder="placeholder_tessdata" placeholder="tessdata 資料夾路徑...">
                        <button class="btn btn-secondary" onclick="browseTesseractDataPath()" data-i18n="btn_browse">瀏覽</button>
                    </div>
                </div>
            </div>

            <!-- Output Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_output_settings">輸出</div>

                <div class="form-group">
                    <label data-i18n="label_default_output_folder">預設輸出資料夾</label>
                    <div class="path-row">
                        <input type="text" id="settingDefaultOutputFolder" class="path-input" data-i18n-placeholder="placeholder_output" placeholder="預設輸出路徑...">
                        <button class="btn btn-secondary" onclick="browseDefaultOutputFolder()" data-i18n="btn_browse">瀏覽</button>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="label_filename_format">檔名格式</label>
                    <select id="settingFilenameFormat">
                        <option value="multipage_YYYYMMDD_HHmmss">multipage_YYYYMMDD_HHmmss</option>
                        <option value="input_YYYYMMDD_HHmmss">input_YYYYMMDD_HHmmss</option>
                    </select>
                </div>

                <div class="form-group">
                    <label data-i18n="label_multi_page_mode_settings">多頁模式</label>
                    <select id="settingMultiPageMode">
                        <option value="false" data-i18n-opt="option_page_by_page">逐頁轉換</option>
                        <option value="true" data-i18n-opt="option_merge_multi_page">合併為多頁</option>
                    </select>
                </div>
            </div>

            <!-- Font Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_font">字體</div>

                <div class="form-group">
                    <label data-i18n="label_font_mode">字體模式</label>
                    <select id="settingFontMode" onchange="updateFontModeVisibility()">
                        <option value="auto" data-i18n-opt="option_font_auto">自動（依語言）</option>
                        <option value="custom" data-i18n-opt="option_custom">自訂</option>
                    </select>
                </div>

                <div class="form-group" id="customFontPathGroup" style="display: none;">
                    <label data-i18n="label_custom_font_path">自訂字體路徑</label>
                    <div class="path-row">
                        <input type="text" id="settingCustomFontPath" class="path-input" data-i18n-placeholder="placeholder_font" placeholder="選擇 TTF 字體檔案...">
                        <button class="btn btn-secondary" onclick="browseCustomFont()" data-i18n="btn_browse">瀏覽</button>
                    </div>
                </div>
            </div>

            <!-- Text Layer Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_text_layer">文字層</div>

                <div class="form-group">
                    <label data-i18n="label_color">顏色</label>
                    <select id="settingTextColor">
                        <option value="white" data-i18n-opt="option_white">白色</option>
                        <option value="black" data-i18n-opt="option_black">黑色</option>
                        <option value="red" data-i18n-opt="option_red">紅色</option>
                        <option value="blue" data-i18n-opt="option_blue">藍色</option>
                        <option value="debug" data-i18n-opt="option_debug_mode">調試模式</option>
                    </select>
                </div>

                <div class="form-group">
                    <label data-i18n="label_opacity">透明度</label>
                    <div class="range-row">
                        <input type="range" id="settingTextOpacity" class="range-slider"
                               min="0" max="1" step="0.0001" value="0.0001"
                               oninput="updateOpacityValue()">
                        <span class="range-value" id="opacityValue">0.0001</span>
                    </div>
                </div>
            </div>

            <!-- Text Conversion Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_text_conversion">文字轉換</div>

                <div class="form-group">
                    <label data-i18n="label_chinese_conversion">簡繁轉換</label>
                    <select id="settingChineseConversion">
                        <option value="null" data-i18n-opt="option_no_conversion">不轉換</option>
                        <option value="s2t" data-i18n-opt="option_s2t">簡體→繁體</option>
                        <option value="t2s" data-i18n-opt="option_t2s">繁體→簡體</option>
                    </select>
                </div>
            </div>

            <!-- Interface Section -->
            <div class="card">
                <div class="card-title" data-i18n="card_interface">界面</div>

                <div class="form-group">
                    <label data-i18n="label_ui_language">UI 語言</label>
                    <select id="settingUiLanguage" onchange="changeUiLanguage()">
                        <option value="zh-TW">繁體中文</option>
                        <option value="zh-CN">简体中文</option>
                        <option value="en">English</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="settingNotifyOnComplete" checked>
                        <span data-i18n="label_notify_on_complete">完成後通知</span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="settingOpenFolderOnComplete" checked>
                        <span data-i18n="label_open_folder_on_complete">完成後自動開啟資料夾</span>
                    </label>
                </div>
            </div>

            <!-- Settings Buttons -->
            <div class="card">
                <div class="settings-buttons">
                    <button class="btn btn-secondary" onclick="resetSettings()" data-i18n="btn_reset">恢復預設</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript bridge for Python callbacks
        window.pythonBridge = {
            onProgress: function(current, total, message) {
                console.log('Progress:', current, '/', total, message);
                updateProgress(current, total, message);
            },

            onComplete: function(filesJson) {
                console.log('Complete:', filesJson);
                try {
                    var files = JSON.parse(filesJson);
                    showSuccess(files);
                } catch (e) {
                    showSuccess([filesJson]);
                }
            },

            onError: function(message) {
                console.error('Error:', message);
                addLog(message, 'error');
                resetUI();
            },

            onLog: function(message) {
                console.log('Log:', message);
                addLog(message);
            }
        };

        // State
        var isProcessing = false;
        var currentSettings = {};

        // Auto-save settings on any Tab 2 input change
        document.getElementById('tab-settings').addEventListener('change', function(e) {
            if (e.target.closest('#tab-settings')) {
                saveSettings();
            }
        });

        // i18n translations
        var i18n = {
            'zh-TW': {
                // Tab navigation
                'tab_convert': '轉換',
                'tab_settings': '設定',
                // Input section
                'card_input': '輸入設置',
                'label_input_type': '輸入類型',
                'label_image_folder': '圖片資料夾',
                'label_pdf_file': 'PDF 檔案',
                'label_select_image_folder': '選擇圖片資料夾',
                'label_select_pdf_file': '選擇 PDF 檔案',
                'btn_browse': '瀏覽',
                'placeholder_browse': '點擊瀏覽選擇...',
                // OCR section
                'card_ocr': 'OCR 設置',
                'label_ocr_language': '識別語言',
                // Output section
                'card_output': '輸出設置',
                'label_output_format': '輸出格式',
                'label_multi_page_mode': '多頁模式 (所有圖片合併為一個檔案)',
                'label_output_folder': '輸出資料夾',
                // Action buttons
                'btn_start': '開始轉換',
                'btn_cancel': '取消轉換',
                // Progress section
                'card_progress': '轉換進度',
                'text_preparing': '準備中...',
                'text_processing': '處理中...',
                'text_complete': '轉換完成!',
                // Settings - OCR Engine
                'card_ocr_engine': 'OCR 引擎',
                'label_engine': '引擎',
                'option_auto': '自動',
                'label_tesseract_data_path': 'Tesseract 資料路徑',
                'placeholder_tessdata': 'tessdata 資料夾路徑...',
                // Settings - Output
                'card_output_settings': '輸出',
                'label_default_output_folder': '預設輸出資料夾',
                'placeholder_output': '預設輸出路徑...',
                'label_filename_format': '檔名格式',
                'label_multi_page_mode_settings': '多頁模式',
                'option_page_by_page': '逐頁轉換',
                'option_merge_multi_page': '合併為多頁',
                // Settings - Font
                'card_font': '字體',
                'label_font_mode': '字體模式',
                'option_font_auto': '自動（依語言）',
                'option_custom': '自訂',
                'label_custom_font_path': '自訂字體路徑',
                'placeholder_font': '選擇 TTF 字體檔案...',

        // Current UI language
        var currentUiLanguage = 'zh-TW';

        // Get i18n text
        function t(key) {
            var lang = i18n[currentUiLanguage];
            if (lang && lang[key]) {
                return lang[key];
            }
            return key;
        }

        // Apply i18n to all elements with data-i18n attribute
        function applyI18n() {
            var elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                var text = t(key);
                if (el.tagName === 'INPUT' && (el.type === 'submit' || el.type === 'button')) {
                    el.value = text;
                } else {
                    el.textContent = text;
                }
            });
            var placeholders = document.querySelectorAll('[data-i18n-placeholder]');
            placeholders.forEach(function(el) {
                var key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = t(key);
            });
            var options = document.querySelectorAll('[data-i18n-opt]');
            options.forEach(function(el) {
                var key = el.getAttribute('data-i18n-opt');
                el.textContent = t(key);
            });
            updateLanguageSelectOptions();
        }

        // Update language select dropdown options
        function updateLanguageSelectOptions() {
            var select = document.getElementById('settingUiLanguage');
            if (select) {
                select.options[0].text = t('lang_zh_tw');
                select.options[1].text = t('lang_zh_cn');
                select.options[2].text = t('lang_en');
            }
        }

        // Default settings: loaded from Python API (default.json)
        var defaultSettings = null;

        // Switch tab
        function switchTab(tabName, btn) {
            var buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(function(b) {
                b.classList.remove('active');
            });
            btn.classList.add('active');

            document.querySelectorAll('.tab-content').forEach(function(content) {
                content.classList.remove('active');
            });
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // Update input type label
        function updateInputType() {
            var isFolder = document.querySelector('input[name="inputType"]:checked').value === 'folder';
            document.getElementById('inputLabel').textContent = isFolder ? t('label_select_image_folder') : t('label_select_pdf_file');
            document.getElementById('inputPath').value = '';
        }

        // Browse input path
        async function browseInput() {
            try {
                var isFolder = document.querySelector('input[name="inputType"]:checked').value === 'folder';
                var currentPath = document.getElementById('inputPath').value || '';
                var path;

                if (isFolder) {
                    path = await window.pywebview.api.open_directory_chooser(currentPath);
                } else {
                    path = await window.pywebview.api.open_file_chooser();
                }

                if (path) {
                    document.getElementById('inputPath').value = path;
                    await saveCurrentPaths();
                }
            } catch (e) {
                alert('Error: ' + e.message + '\npywebview API exists: ' + (window.pywebview !== undefined));
            }
        }

        async function browseOutput() {

                var path = await window.pywebview.api.open_directory_chooser(currentPath);

                    await saveCurrentPaths();
                }

        // Save current input/output paths to settings
        async function saveCurrentPaths() {
            var settings = getSettingsFromUI();
            settings.inputPath = document.getElementById('inputPath').value;
            settings.outputPath = document.getElementById('outputPath').value;
            currentSettings = settings;
            try {
                await window.pywebview.api.save_settings(JSON.stringify(settings));

        // Change UI language
        async function changeUiLanguage() {
            var select = document.getElementById('settingUiLanguage');
            var newLang = select.value;
            var langMap = {
                'zh-TW': 'zh-TW',
                'zh-CN': 'zh-CN',
                'en': 'en'
            };
            currentUiLanguage = langMap[newLang] || 'zh-TW';
            applyI18n();
            saveSettings();
        }

        // Load settings from Python
        async function loadSettings() {
            try {
                if (!defaultSettings) {
                    var defaultsJson = await window.pywebview.api.load_default_settings();
                    if (defaultsJson && defaultsJson.trim() !== '') {
                        defaultSettings = JSON.parse(defaultsJson);
                    } else {
                        defaultSettings = {};
                    }
                }
                var settingsJson = await window.pywebview.api.load_settings();
                if (settingsJson && settingsJson.trim() !== '') {
                    currentSettings = JSON.parse(settingsJson);
                    applySettings(currentSettings);
                } else {
                    applySettings(defaultSettings);
                    currentSettings = Object.assign({}, defaultSettings);
                }
            } catch (e) {
                console.error('Error loading settings:', e);
                if (defaultSettings) {
                    applySettings(defaultSettings);
                    currentSettings = Object.assign({}, defaultSettings);
                }
            }
        }

        // Apply settings to UI
        function applySettings(settings) {
            if (settings.ocrEngine) document.getElementById('settingOcrEngine').value = settings.ocrEngine;
            if (settings.tesseractDataPath !== undefined) document.getElementById('settingTesseractDataPath').value = settings.tesseractDataPath;
            if (settings.defaultOutputFolder !== undefined) document.getElementById('settingDefaultOutputFolder').value = settings.defaultOutputFolder;
            if (settings.filenameFormat) document.getElementById('settingFilenameFormat').value = settings.filenameFormat;
            if (settings.multiPageMode) document.getElementById('settingMultiPageMode').value = settings.multiPageMode;
            if (settings.fontMode) document.getElementById('settingFontMode').value = settings.fontMode;
            if (settings.customFontPath !== undefined) document.getElementById('settingCustomFontPath').value = settings.customFontPath;
            if (settings.textColor) document.getElementById('settingTextColor').value = settings.textColor;
            if (settings.textOpacity !== undefined) {
                document.getElementById('settingTextOpacity').value = settings.textOpacity;
                document.getElementById('opacityValue').textContent = parseFloat(settings.textOpacity).toFixed(4);
            }
            if (settings.chineseConversion) document.getElementById('settingChineseConversion').value = settings.chineseConversion;
            if (settings.uiLanguage) {
                document.getElementById('settingUiLanguage').value = settings.uiLanguage;
                var langMap = { 'zh-TW': 'zh-TW', 'zh-CN': 'zh-CN', 'en': 'en' };
                currentUiLanguage = langMap[settings.uiLanguage] || 'zh-TW';
                applyI18n();
            }
            if (settings.notifyOnComplete !== undefined) document.getElementById('settingNotifyOnComplete').checked = settings.notifyOnComplete;
            if (settings.openFolderOnComplete !== undefined) document.getElementById('settingOpenFolderOnComplete').checked = settings.openFolderOnComplete;

            updateFontModeVisibility();
            if (settings.inputPath) document.getElementById('inputPath').value = settings.inputPath;
            if (settings.outputPath) document.getElementById('outputPath').value = settings.outputPath;
        }

        // Get current settings from UI
        function getSettingsFromUI() {
            return {
                ocrEngine: document.getElementById('settingOcrEngine').value,
                tesseractDataPath: document.getElementById('settingTesseractDataPath').value,
                defaultOutputFolder: document.getElementById('settingDefaultOutputFolder').value,
                filenameFormat: document.getElementById('settingFilenameFormat').value,
                multiPageMode: document.getElementById('settingMultiPageMode').value,
                fontMode: document.getElementById('settingFontMode').value,
                customFontPath: document.getElementById('settingCustomFontPath').value,
                textColor: document.getElementById('settingTextColor').value,
                textOpacity: parseFloat(document.getElementById('settingTextOpacity').value),
                chineseConversion: document.getElementById('settingChineseConversion').value,
                uiLanguage: document.getElementById('settingUiLanguage').value,
                notifyOnComplete: document.getElementById('settingNotifyOnComplete').checked,
                openFolderOnComplete: document.getElementById('settingOpenFolderOnComplete').checked
            };
        }

            if (confirm(t('msg_confirm_reset_all'))) {
                if (!defaultSettings) {
                    var defaultsJson = await window.pywebview.api.load_default_settings();
                    defaultSettings = defaultsJson ? JSON.parse(defaultsJson) : {};

                applySettings(defaultSettings);
                currentSettings = Object.assign({}, defaultSettings);
                resetTab1Fields();

                    await window.pywebview.api.delete_settings();
                } catch (e) {
                    // ignore if file doesn't exist
                }

        }

                }
                applySettings(defaultSettings);
                currentSettings = Object.assign({}, defaultSettings);
                resetTab1Fields();
                try {
                    await window.pywebview.api.delete_settings();

        // Reset Tab 1 form fields to defaults
        function resetTab1Fields() {
            document.querySelector('input[name="inputType"][value="folder"]').checked = true;
            updateInputType();
            document.getElementById('language').value = 'chinese_cht';
            document.getElementById('formatPdf').checked = true;
            document.getElementById('formatOfd').checked = true;
            document.getElementById('formatTxt').checked = false;
            document.getElementById('multiPage').checked = false;
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('logArea').innerHTML = '';
            document.getElementById('successMessage').classList.remove('active');
            document.getElementById('progressBar').style.width = '0%';
        }

        // Start conversion
        async function startConversion() {
            if (isProcessing) return;

            var inputType = document.querySelector('input[name="inputType"]:checked').value;
            var inputPath = document.getElementById('inputPath').value;
            var outputPath = document.getElementById('outputPath').value;
            var language = document.getElementById('language').value;
            var multiPage = document.getElementById('multiPage').checked;

            var formats = [];
            if (document.getElementById('formatPdf').checked) formats.push('pdf');
            if (document.getElementById('formatOfd').checked) formats.push('ofd');
            if (document.getElementById('formatTxt').checked) formats.push('txt');

            if (!inputPath) {
                alert(t('msg_select_input'));
                return;
            }
            if (!outputPath) {
                alert(t('msg_select_output'));
                return;
            }
            if (formats.length === 0) {
                alert(t('msg_select_format'));
                return;
            }

            var config = {
                inputType: inputType,
                inputPath: inputPath,
                outputPath: outputPath,
                language: language,
                formats: formats.join(','),
                multiPage: multiPage
            };

            if (currentSettings.ocrEngine) config.ocrEngine = currentSettings.ocrEngine;
            if (currentSettings.tesseractDataPath) config.tesseractDataPath = currentSettings.tesseractDataPath;
            if (currentSettings.fontMode) config.fontMode = currentSettings.fontMode;
            if (currentSettings.customFontPath) config.customFontPath = currentSettings.customFontPath;
            if (currentSettings.textColor) config.textColor = currentSettings.textColor;
            if (currentSettings.textOpacity !== undefined) config.textOpacity = currentSettings.textOpacity;
            if (currentSettings.chineseConversion && currentSettings.chineseConversion !== 'null') {
                config.chineseConversion = currentSettings.chineseConversion;
            }

            isProcessing = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('successMessage').classList.remove('active');
            document.getElementById('logArea').innerHTML = '';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = t('text_preparing');

            var configJson = JSON.stringify(config);
            addLog(t('msg_start_conversion'));
            addLog(t('msg_config') + configJson);

            try {
                await window.pywebview.api.start_conversion(configJson);
            } catch (e) {
                console.error('Error calling startConversion:', e);
                addLog(t('msg_error') + e.message, 'error');
                resetUI();
            }
        }

        // Cancel conversion
        async function cancelConversion() {
            try {
                await window.pywebview.api.cancel_conversion();
            } catch (e) {
                console.error('Error calling cancelConversion:', e);
            }
            resetUI();
        }

        // Update progress
        function updateProgress(current, total, message) {
            var percent = total > 0 ? Math.round((current / total) * 100) : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = current + ' / ' + total + ' - ' + (message || t('text_processing'));
            if (message) {
                addLog(message);
            }
        }

        // Add log entry
        function addLog(message, type) {
            var logArea = document.getElementById('logArea');
            var line = document.createElement('div');
            line.className = 'log-line';
            if (type) {
                line.classList.add(type);
            }
            var time = new Date().toLocaleTimeString();
            line.textContent = '[' + time + '] ' + message;
            logArea.appendChild(line);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // Show success
        function showSuccess(files) {
            addLog(t('text_complete'), 'success');
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').textContent = t('text_complete');

            var fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            files.forEach(function(file) {
                var li = document.createElement('li');
                li.textContent = file;
                fileList.appendChild(li);
            });

            document.getElementById('successMessage').classList.add('active');
            resetUI();
        }

        // Reset UI
        function resetUI() {
            isProcessing = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // Initialize - pywebview API is available immediately, no polling needed
        function hideLoadingOverlay() {
            var overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('fade-out');
            setTimeout(function() { overlay.style.display = 'none'; }, 350);
        }

        document.addEventListener('DOMContentLoaded', function() {
            window.addEventListener('pywebviewready', async function() {
                console.log('pywebview API ready');
                try {
                    await loadSettings();
                } catch (e) {
                    console.error('Failed to load settings:', e);
                    document.getElementById('loadingError').style.display = 'block';
                    document.querySelector('.loading-spinner').style.display = 'none';
                    document.querySelector('.loading-text').textContent = 'Initialization failed';
                }
                hideLoadingOverlay();
            });
        });
    </script>
</body>
</html>
