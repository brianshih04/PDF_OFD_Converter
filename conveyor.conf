// 1. 使用 Conveyor 自動下載 Azul Zulu 21 JDK + JavaFX 模組
// JavaFX JMODs 由 from-jmods.conf 從 Gluon 下載，jlink 自動連結
include "/stdlib/jdk/21/azul.conf"
include "/stdlib/jvm/javafx/from-jmods.conf"
javafx.version = "21.0.2"

app {
    display-name = "JPEG2PDF-OFD-OCR"
    fsname = "jpeg2pdf-ofd-ocr"
    rdns-name = "com.ocr.jpeg2pdf"
    version = "3.0.0"
    vendor = "Brian Shih"
    license = "MIT"
    
    // 目前僅打包 Windows x64
    machines = [ windows.amd64 ]
    
    vcs-url = "github.com/brianshih04/PDF_OFD_Converter"
    site.base-url = "https://brianshih04.github.io/PDF_OFD_Converter"
    
    // 2. 您的 JAR 檔路徑
    inputs += "target/jpeg2pdf-ofd-nospring-3.0.0.jar"
    
    jvm {
        options = [
            "-Xmx2G"
        ]
        // JavaFX 模組由 from-jmods.conf 提供，需列出所需的模組
        modules = [
            "javafx.controls",
            "javafx.fxml",
            "javafx.graphics",
            "javafx.media",
            "javafx.swing",
            "javafx.web",
            "java.naming",
            "jdk.zipfs"
        ]
    }
    
    // 3. GUI 應用程式進入點
    main-class = "com.ocr.nospring.Main"
}

// Windows 配置 — 禁用簽章以跳過 MSIX 產出，僅生成 ZIP
app.windows {
    sign = false
    console = false
}

conveyor.compatibility-level = 19
