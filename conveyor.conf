// 1. 使用 Conveyor 自動下載 Azul Zulu 21 JDK + JavaFX 模組
// JavaFX JMODs 由 from-jmods.conf 從 Gluon 下載，jlink 自動連結
include "/stdlib/jdk/21/azul.conf"
include "/stdlib/jvm/javafx/from-jmods.conf"
javafx.version = "21.0.2"

app {
    display-name = "JPEG2PDF-OFD-OCR v0.10"
    fsname = "jpeg2pdf-ofd-ocr"
    rdns-name = "com.ocr.jpeg2pdf"
    version = "3.0.0"
    vendor = "Brian Shih"
    license = "MIT"
    
    // 支持所有平台（包括國產 Linux ARM64）
    machines = [ 
        windows.amd64,
        mac.amd64,
        mac.aarch64,
        linux.amd64.glibc,
        linux.aarch64.glibc  // 新增：支持華為鯤鵬、飛騰等 ARM64 國產平台
    ]
    
    vcs-url = "github.com/brianshih04/PDF_OFD_Converter"
    site.base-url = "https://brianshih04.github.io/PDF_OFD_Converter"
    
    // 2. 您的 JAR 檔路徑
    inputs += "target/jpeg2pdf-ofd-nospring-3.0.0.jar"
    
    jvm {
        options = [
            "-Xmx2G"
        ]
        // JavaFX 模組由 from-jmods.conf 提供，需列出所需的模組
        modules = [
            "javafx.controls",
            "javafx.fxml",
            "javafx.graphics",
            "javafx.media",
            "javafx.swing",
            "javafx.web",
            "jdk.zipfs"
        ]
    }
    
    // 3. GUI 應用程式進入點
    main-class = "com.ocr.nospring.Main"
}

// Windows 安裝包配置
app.windows {
    generate-msi = true
    console = false
    // 自簽憑證（本地測試用）
    code-sign = "1FC768E09727CF537A6F42B2E15EDCE115FB7B57"
}

// Linux 通用配置
app.linux {
    package-type = "deb"  // 默認 DEB（支持 UOS、Deepin、openEuler）
    maintainer = "Brian Shih"
    categories = "Graphics;OCR;Utility"
}

// x86_64 平台配置（支持大多數國產 Linux）
app.linux.amd64 {
    // 生成 DEB 和 RPM 兩種格式
    package-type = [ "deb", "rpm" ]
}

// ARM64 平台配置（支持華為鯤鵬、飛騰）
app.linux.aarch64 {
    // 生成 DEB 和 RPM 兩種格式
    package-type = [ "deb", "rpm" ]
}

conveyor.compatibility-level = 19
