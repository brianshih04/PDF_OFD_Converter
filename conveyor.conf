// 1. 指定要打包哪一個版本與廠牌的 JDK (這裡使用 Amazon Corretto Java 17)
include "/stdlib/jdk/17/amazon.conf"

app {
    display-name = "JPEG2PDF-OFD OCR CLI"
    fsname = "jpeg2pdf-ofd-cli"
    rdns-name = "com.ocr.jpeg2pdf"
    version = "3.0.0"
    vendor = "Brian Shih"
    license = "MIT"
    
    machines = [ windows.amd64, mac.amd64, mac.aarch64, linux.amd64.glibc ]
    vcs-url = "github.com/brianshih04/jpeg2pdf-ofd-conveyor"
    site.base-url = "https://brianshih04.github.io/jpeg2pdf-ofd-conveyor"
    
    // 2. 您的 JAR 檔路徑
    inputs += "target/jpeg2pdf-ofd-nospring-3.0.0-jar-with-dependencies.jar"
    
    jvm {
        options = [
            "-Xmx2G",
            "-Djava.awt.headless=true"
        ]
    }
    
    // 3. CLI 指令設定
    cli {
        jpeg2pdf-ofd = "com.ocr.nospring.Main"
    }
}

app.linux {
    package-type = "deb"
    maintainer = "Brian Shih"
    categories = "Graphics;OCR;Utility"
}

conveyor.compatibility-level = 22